name: チケット発売日 自動チェック

on:
  schedule:
    # 毎日 日本時間 9:00 (UTC 0:00) に実行
    - cron: '0 0 * * *'
  workflow_dispatch: {} # 手動実行もできるようにしておく

permissions:
  contents: write

jobs:
  check-tickets:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Node.jsをセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 依存パッケージをインストール
        run: npm install cheerio --no-save

      - name: 発売日チェック・自動反映スクリプトを実行
        run: node scripts/check-tickets.js

      - name: 変更があればコミット・プッシュ
        run: |
          git config user.name "ticket-checker-bot"
          git config user.email "actions@users.noreply.github.com"
          if ! git diff --quiet -- src/App.jsx; then
            git add src/App.jsx
            git commit -m "chore: チケット発売日の自動更新 ($(date -u +'%Y-%m-%d'))"
            git push
          else
            echo "変更なし"
          fi
